<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'none'; style-src ${cspSource} 'unsafe-inline'; script-src ${cspSource} 'unsafe-inline'; img-src ${cspSource} https: http: data: svg: blob:; connect-src 'none'; font-src 'none'; object-src 'none'; media-src 'none'; frame-src 'none';">
    <title>本地注释输入</title>
    <link rel="stylesheet" href="${cssUri}">
    <link rel="stylesheet" href="${katexCssUri}">
    <link rel="stylesheet" href="${highlightCssUri}">
</head>
<body>
    <div class="container">
        ${contextHtml}
        <div class="header">
            <div class="prompt-row">
                <span class="prompt">${escapedPrompt}</span>
                <div class="help-hint-wrapper">
                    <div class="help-hint-trigger">
                        <span class="help-hint-icon" aria-label="支持的功能">!</span>
                        <div class="help-popover">
                        <div class="help-popover-title">支持的功能</div>
                        <ul class="help-popover-list">
                            <li>支持 Markdown 语法</li>
                            <li>支持 Mermaid 流程图语法</li>
                            <li>标签：使用 <code>${标签名}</code> 声明，使用 <code>@标签名</code> 引用</li>
                            <li>LaTeX 公式：行内使用 <code>$公式$</code>，块级使用 <code>$$公式$$</code></li>
                        </ul>
                    </div>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="input-area">
            <div class="autocomplete">
                <textarea 
                    id="contentInput" 
                    placeholder="${escapedPlaceholder}"
                    autofocus
                >${escapedContent}</textarea>
                <div id="autocompleteDropdown" class="autocomplete-dropdown"></div>
            </div>
            <div class="resize-hint">↘ 可拖拽调整大小</div>
        </div>
        
        <div class="button-group">
            <button class="cancel-btn" onclick="cancel()">取消</button>
            <button class="save-continue-btn" onclick="saveAndContinue()">保存</button>
            <button class="save-btn" onclick="save()">保存并退出</button>
            ${shareButtonHtml}
        </div>
    </div>

    <script src="${markedJsUri}" onerror="console.error('marked.js 加载失败')"></script>
    <script src="${highlightJsUri}" onerror="console.error('highlight.js 加载失败')"></script>
    <script src="${mermaidJsUri}" onerror="console.error('mermaid.js 加载失败')"></script>
    <script src="${katexJsUri}" onerror="console.error('katex.js 加载失败')"></script>
    ${publicJsScript}
    <script>
        // 将标签建议传递给主脚本
        window.tagSuggestions = '${tagSuggestions}';
        
        // 动态调整弹出框位置，避免超出视窗边界
        (function() {
            const wrapper = document.querySelector('.help-hint-wrapper');
            const popover = document.querySelector('.help-popover');
            const trigger = document.querySelector('.help-hint-trigger');
            
            if (!wrapper || !popover || !trigger) return;
            
            const MARGIN = 10; // 距离视窗边缘的最小距离
            let resizeTimer = null;
            let scrollTimer = null;
            
            function adjustPopoverPosition() {
                // 检查弹出框是否可见（通过 CSS hover 控制）
                const computedStyle = window.getComputedStyle(popover);
                const isVisible = computedStyle.visibility === 'visible' && 
                                  computedStyle.opacity !== '0';
                
                // 如果不可见，临时显示以测量位置
                if (!isVisible) {
                    popover.style.visibility = 'visible';
                    popover.style.opacity = '0';
                    popover.style.pointerEvents = 'none';
                }
                
                const triggerRect = trigger.getBoundingClientRect();
                const viewportWidth = window.innerWidth;
                
                // 重置定位样式
                popover.style.left = '';
                popover.style.right = '';
                
                // 强制重排以获取最新位置
                void popover.offsetWidth;
                
                const popoverRect = popover.getBoundingClientRect();
                
                // 检查并调整位置
                if (popoverRect.right > viewportWidth - MARGIN) {
                    // 超出右边界，右对齐到图标
                    popover.style.left = 'auto';
                    popover.style.right = '0';
                } else if (popoverRect.left < MARGIN) {
                    // 超出左边界，调整到视窗边缘
                    popover.style.left = (MARGIN - triggerRect.left) + 'px';
                } else {
                    // 默认左对齐到图标
                    popover.style.left = '0';
                }
                
                // 如果之前不可见，恢复隐藏状态
                if (!isVisible) {
                    popover.style.visibility = '';
                    popover.style.opacity = '';
                    popover.style.pointerEvents = '';
                }
            }
            
            // 监听鼠标悬停
            wrapper.addEventListener('mouseenter', () => {
                // 使用 requestAnimationFrame 确保 CSS hover 已生效
                requestAnimationFrame(() => {
                    requestAnimationFrame(adjustPopoverPosition);
                });
            });
            
            // 监听窗口大小变化（防抖处理）
            window.addEventListener('resize', () => {
                clearTimeout(resizeTimer);
                resizeTimer = setTimeout(adjustPopoverPosition, 150);
            });
            
            // 监听滚动（防抖处理，只在弹出框可见时调整）
            window.addEventListener('scroll', () => {
                const computedStyle = window.getComputedStyle(popover);
                if (computedStyle.visibility === 'visible') {
                    clearTimeout(scrollTimer);
                    scrollTimer = setTimeout(adjustPopoverPosition, 50);
                }
            }, true);
        })();
    </script>
    <script src="${jsUri}"></script>
</body>
</html>

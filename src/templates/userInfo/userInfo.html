<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'none'; style-src ${cspSource} 'unsafe-inline'; img-src ${cspSource} https: data:; script-src 'nonce-${nonce}';">
    <title>用户信息</title>
    <link rel="stylesheet" href="${cssUri}">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>用户信息面板</h1>
        </div>
        
        <div id="user-info-content">
            <div id="loading" class="loading">
                <div class="spinner"></div>
                <p>正在加载用户信息...</p>
            </div>
            
            <div id="user-profile" class="user-profile" style="display: none;">
                <!-- 用户基本信息 -->
                <div class="profile-section">
                    <div class="avatar-container">
                        <img id="user-avatar" src="" alt="用户头像" class="avatar">
                        <div class="avatar-placeholder" id="avatar-placeholder">
                            <span id="avatar-initial"></span>
                        </div>
                        <div class="avatar-overlay" id="avatar-overlay">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                                <path d="M21 15V19C21 19.5304 20.7893 20.0391 20.4142 20.4142C20.0391 20.7893 19.5304 21 19 21H5C4.46957 21 3.96086 20.7893 3.58579 20.4142C3.21071 20.0391 3 19.5304 3 19V15" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                                <path d="M7 10L12 15L17 10" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                                <path d="M12 15V3" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                            </svg>
                            <span>更换头像</span>
                        </div>
                    </div>
                    <div class="basic-info">
                        <h2 id="user-name" class="user-name"></h2>
                        <p id="user-email" class="user-email"></p>
                        <div class="user-status">
                            <span class="status-dot"></span>
                            <span>在线</span>
                        </div>
                    </div>
                </div>
                
                <!-- 账户信息 -->
                <div class="info-section">
                    <h3 class="section-title">账户信息</h3>
                    <div class="info-grid">
                        <div class="info-item">
                            <label>用户ID</label>
                            <span id="user-id"></span>
                        </div>
                        <div class="info-item">
                            <label>创建时间</label>
                            <span id="user-created-at"></span>
                        </div>
                        <div class="info-item">
                            <label>最后登录</label>
                            <span id="user-last-login"></span>
                        </div>
                    </div>
                </div>
                
                <!-- 项目信息 -->
                <div class="info-section">
                    <h3 class="section-title">我的项目</h3>
                    <div id="projects-loading" class="projects-loading">
                        <div class="spinner small"></div>
                        <span>正在加载项目...</span>
                    </div>
                    <div id="projects-list" class="projects-list" style="display: none;">
                        <!-- 项目列表将通过JavaScript动态生成 -->
                    </div>
                    <div id="projects-empty" class="projects-empty" style="display: none;">
                        <div class="empty-icon">
                            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                                <path d="M4 7V4C4 2.89543 4.89543 2 6 2H18C19.1046 2 20 2.89543 20 4V7" stroke="currentColor" stroke-width="2"/>
                                <path d="M4 7H20L19 21H5L4 7Z" stroke="currentColor" stroke-width="2"/>
                                <path d="M9 11V7" stroke="currentColor" stroke-width="2"/>
                                <path d="M15 11V7" stroke="currentColor" stroke-width="2"/>
                            </svg>
                        </div>
                        <p>暂无项目</p>
                        <small>您还没有加入任何项目</small>
                    </div>
                    <div id="projects-error" class="projects-error" style="display: none;">
                        <div class="error-icon">
                            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                                <path d="M12 2L2 7L12 12L22 7L12 2Z" stroke="currentColor" stroke-width="2"/>
                                <path d="M2 17L12 22L22 17" stroke="currentColor" stroke-width="2"/>
                                <path d="M2 12L12 17L22 12" stroke="currentColor" stroke-width="2"/>
                            </svg>
                        </div>
                        <p id="projects-error-text">加载项目失败</p>
                        <button class="btn btn-secondary" id="retry-projects-btn">重试</button>
                    </div>
                    <!-- 获取共享注释按钮 -->
                    <div id="fetch-shared-comments" class="fetch-shared-comments" style="display: none; margin-top: 15px;">
                        <button class="btn btn-primary" id="fetch-shared-btn">
                            获取项目共享注释
                        </button>
                        <div id="fetch-shared-status" class="fetch-shared-status" style="margin-top: 10px; display: none;">
                            <div class="spinner small"></div>
                            <span>正在获取共享注释...</span>
                        </div>
                    </div>
                </div>
                
                <!-- 统计信息 -->
                <div class="info-section">
                    <h3 class="section-title">使用统计</h3>
                    <div class="stats-grid">
                        <div class="stat-item">
                            <div class="stat-value" id="comments-count">--</div>
                            <div class="stat-label">注释数量</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-value" id="bookmarks-count">--</div>
                            <div class="stat-label">书签数量</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-value" id="tags-count">--</div>
                            <div class="stat-label">标签数量</div>
                        </div>
                    </div>
                </div>
                
                <!-- 操作按钮 -->
                <div class="actions">
                    <button class="btn btn-secondary" id="refresh-btn">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M21 12C21 16.9706 16.9706 21 12 21C7.02944 21 3 16.9706 3 12C3 7.02944 7.02944 3 12 3C16.9706 3 21 7.02944 21 12Z" stroke="currentColor" stroke-width="2"/>
                            <path d="M12 7V12L15 15" stroke="currentColor" stroke-width="2"/>
                        </svg>
                        刷新信息
                    </button>
                    <button class="btn btn-danger" id="logout-btn">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M9 21H5C3.89543 21 3 20.1046 3 19V5C3 3.89543 3.89543 3 5 3H9" stroke="currentColor" stroke-width="2"/>
                            <path d="M16 17L21 12L16 7" stroke="currentColor" stroke-width="2"/>
                            <path d="M21 12H9" stroke="currentColor" stroke-width="2"/>
                        </svg>
                        退出登录
                    </button>
                </div>
            </div>
            
            <div id="error-message" class="error-message" style="display: none;">
                <h3>加载失败</h3>
                <p id="error-text"></p>
                <button class="btn btn-primary" id="retry-btn">重试</button>
            </div>
        </div>
    </div>

    <!-- 确认模态框 -->
    <div id="confirm-modal" class="modal" style="display: none;">
        <div class="modal-content">
            <p id="modal-text"></p>
            <div class="modal-buttons">
                <button id="modal-confirm-btn" class="btn btn-danger"></button>
                <button id="modal-cancel-btn" class="btn btn-secondary"></button>
            </div>
        </div>
    </div>
    
    <!-- 头像上传模态框 -->
    <div id="avatar-upload-modal" class="modal" style="display: none;">
        <div class="modal-content">
            <h3>更换头像</h3>
            <p>请选择一张图片作为您的头像</p>
            
            <!-- 上传区域 -->
            <div class="upload-area" id="upload-area">
                <div class="upload-placeholder" id="upload-placeholder">
                    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M21 15V19C21 19.5304 20.7893 20.0391 20.4142 20.4142C20.0391 20.7893 19.5304 21 19 21H5C4.46957 21 3.96086 20.7893 3.58579 20.4142C3.21071 20.0391 3 19.5304 3 19V15" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        <path d="M7 10L12 15L17 10" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        <path d="M12 15V3" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                    <p>选择图片文件</p>
                    <small>支持 JPG、PNG 格式，文件大小不超过 2MB</small>
                    <button id="select-image-btn" class="btn btn-primary" style="margin-top: 15px;">选择图片</button>
                </div>
                
                <!-- 预览和裁剪区域 -->
                <div class="preview-container" id="preview-container" style="display: none;">
                    <div class="crop-container" id="crop-container">
                        <img id="preview-image" class="preview-image" alt="预览图片">
                        <div class="crop-overlay" id="crop-overlay">
                            <div class="crop-box" id="crop-box">
                                <div class="crop-handle crop-handle-nw"></div>
                                <div class="crop-handle crop-handle-ne"></div>
                                <div class="crop-handle crop-handle-sw"></div>
                                <div class="crop-handle crop-handle-se"></div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            
            <!-- 裁剪操作按钮 -->
            <div class="crop-actions" id="crop-actions" style="display: none;">
                <button id="crop-confirm-btn" class="btn btn-primary">确认裁剪</button>
                <button id="crop-cancel-btn" class="btn btn-secondary">重新选择</button>
            </div>
            
            <input type="file" id="avatar-file-input" accept="image/*" style="display: none;">
            
            <!-- 模态框底部按钮 -->
            <div class="modal-buttons">
                <button id="upload-confirm-btn" class="btn btn-primary" disabled>确定上传</button>
                <button id="upload-cancel-btn" class="btn btn-secondary">取消</button>
            </div>
        </div>
    </div>
    
    <script nonce="${nonce}" src="${jsUri}"></script>
</body>
</html>
